<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = window.location.pathname;
    if (path.startsWith('/the-mastermind-s-archive')) {
      path = path.replace('/the-mastermind-s-archive', '') || '/';
    }
    window.location.href = '/the-mastermind-s-archive/' + (path === '/' ? '' : path);
  </script>
</head>
<body>
  <p>Redirecting to <a id="link"></a>...</p>
</body>
</html>
